<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>PhoneMic</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png" />
  <style>
    /* ===== 暖调极简浅色（与桌面端 gioui 同源）=====
       bg #FAF7F2 暖米白 / 卡片 #FFFFFF / 墨字 #1A1A1A / 次要 #6B6B6B
       强调 #E8743B 琥珀橙 / 连接绿 #3DAA6D / 边框 #ECE7DF / 浅块 #F4F1EA */
    :root{
      --bg:#FAF7F2; --card:#FFFFFF; --ink:#1A1A1A; --muted:#6B6B6B; --faint:#9B9B94;
      --accent:#E8743B; --accent-press:#D15F28; --ok:#3DAA6D; --border:#ECE7DF; --sunken:#F4F1EA;
      color-scheme: light;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      font-family: "Space Grotesk", -apple-system, "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh; display:flex; flex-direction:column;
      background: var(--bg); color:var(--ink);
    }
    header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card)}
    header .brand{display:flex;align-items:center;gap:9px}
    header .brand .logo{flex:none;display:block}
    header h1{font-size:18px;margin:0;letter-spacing:.3px;font-weight:700}
    header .status{font-size:12px;padding:5px 12px;border-radius:999px;background:var(--sunken);color:var(--muted);font-weight:600}
    header .status.ok{background:#E4F4EC;color:#1E7B4F}
    header .status.err{background:#FBE6DE;color:#C2410C}
    main{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
    .live{
      min-height:110px;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--border);
      font-size:18px;line-height:1.5;white-space:pre-wrap;word-break:break-word
    }
    .live .interim{color:var(--faint)}
    button{
      appearance:none;border:0;border-radius:14px;padding:16px;font-size:17px;font-weight:600;
      background:var(--accent);color:#fff;width:100%;cursor:pointer;
      transition:transform .08s ease, background .2s ease, filter .2s ease;
    }
    button:hover{filter:brightness(.97)}
    button:active{transform:scale(.985);background:var(--accent-press)}
    button:disabled{background:var(--sunken);color:var(--faint);cursor:not-allowed}
    button.recording{background:#E0413B}
    button.secondary{background:var(--sunken);color:var(--ink)}
    button.secondary:hover{filter:none;background:#EDE8DF}
    button.secondary:active{transform:scale(.985);background:#E3DDD2}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .pill{padding:9px 13px;border-radius:999px;background:var(--card);border:1px solid var(--border);font-size:13px;color:var(--muted)}
    .pill.tap{cursor:pointer;user-select:none}
    .pill.tap:active{background:var(--sunken)}
    .toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-left:auto}
    .toggle input{width:18px;height:18px;accent-color:var(--accent)}
    .editbox{
      width:100%;min-height:64px;padding:12px;border-radius:12px;border:1px solid var(--border);
      background:var(--card);color:var(--ink);font-size:16px;line-height:1.5;resize:vertical;font-family:inherit
    }
    .editbox:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
    .btnrow{display:flex;gap:8px}
    .btnrow button{flex:1}
    .hidden{display:none}
    .log{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--faint);max-height:110px;overflow:auto;padding:8px;background:var(--sunken);border-radius:8px}
    footer{padding:12px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--faint);display:flex;justify-content:space-between;background:var(--card)}
    .err{color:#C2410C}

    /* ===== Tab 切换 ===== */
    .tabs{display:flex;gap:6px;padding:5px;background:var(--sunken);border-radius:14px}
    .tabs .tab{
      flex:1;text-align:center;padding:11px;border-radius:10px;font-size:15px;font-weight:600;
      color:var(--muted);cursor:pointer;user-select:none;transition:background .2s,color .2s,box-shadow .2s
    }
    .tabs .tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .tabpane{display:flex;flex-direction:column;gap:14px}
    .tabpane.hidden{display:none}

    /* ===== 卡片分区标题 ===== */
    .sec-head{display:flex;align-items:center;gap:8px}
    .sec-head .title{font-size:15px;font-weight:700;color:var(--ink)}
    .sec-head .clear{margin-left:auto;font-size:12px}

    /* ===== 发送历史区 ===== */
    .hist{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow:auto}
    .hist-item{
      display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
      background:var(--card);border:1px solid var(--border)
    }
    .hist-item .txt{flex:1;font-size:14px;line-height:1.4;word-break:break-word;color:var(--ink)}
    .hist-item .resend{
      flex:none;width:auto;padding:8px 12px;font-size:13px;font-weight:600;border-radius:9px;
      background:var(--sunken);color:var(--ink)
    }
    .hist-empty{font-size:13px;color:var(--faint)}

    /* ===== 上传状态提示 ===== */
    .upstatus{font-size:13px;padding:9px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--muted)}
    .upstatus.ok{color:#1E7B4F;border-color:#BFE6CF;background:#F0FAF4}
    .upstatus.err{color:#C2410C;border-color:#F3CBB8;background:#FDF1EB}
    .upstatus.busy{color:var(--muted)}

    /* ===== 接收区（电脑→手机）===== */
    .recv{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}
    .recv-empty{font-size:13px;color:var(--faint)}
    .recv-item{
      display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;
      background:var(--card);border:1px solid var(--border)
    }
    .recv-item .ic{flex:none;width:22px;height:22px;color:var(--accent)}
    .recv-item .body{flex:1;min-width:0}
    .recv-item .meta{font-size:11px;color:var(--faint);margin-bottom:2px}
    .recv-item .txt{font-size:15px;line-height:1.4;word-break:break-word;color:var(--ink)}
    .recv-item .act{
      flex:none;width:auto;padding:9px 14px;font-size:13px;font-weight:600;border-radius:10px;
      background:var(--sunken);color:var(--ink);text-decoration:none;display:inline-block
    }
    .recv-item a.act{background:var(--accent);color:#fff}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 256 256" width="28" height="28" aria-hidden="true">
        <rect x="78" y="40" width="100" height="176" rx="22" fill="none" stroke="#E8743B" stroke-width="9"/>
        <rect x="113" y="56" width="30" height="6" rx="3" fill="#E8743B" opacity=".55"/>
        <circle cx="128" cy="198" r="6" fill="#E8743B" opacity=".55"/>
        <rect x="113" y="84" width="30" height="56" rx="15" fill="#E8743B"/>
        <path d="M101 126a27 27 0 0 0 54 0" fill="none" stroke="#E8743B" stroke-width="8" stroke-linecap="round"/>
        <rect x="124" y="150" width="8" height="20" rx="4" fill="#E8743B"/>
        <rect x="112" y="168" width="32" height="8" rx="4" fill="#E8743B"/>
        <g fill="none" stroke="#F0A074" stroke-width="7" stroke-linecap="round">
          <path d="M188 96a26 26 0 0 1 0 64"/>
          <path d="M206 80a48 48 0 0 1 0 96" opacity=".6"/>
        </g>
      </svg>
      <h1>PhoneMic</h1>
    </div>
    <span id="status" class="status">连接中…</span>
  </header>

  <main>
    <!-- 顶部信息行：配对码 / 语言（始终可见，两个 tab 共用）-->
    <div class="row">
      <span class="pill" id="pair">配对中…</span>
      <span class="pill tap" id="lang" title="点击切换语言">zh-CN</span>
    </div>

    <!-- Tab 切换：发送（手机→电脑） / 接收（电脑→手机）-->
    <div class="tabs">
      <div class="tab active" id="tabSend" data-pane="send">发送</div>
      <div class="tab" id="tabRecv" data-pane="recv">接收</div>
    </div>

    <!-- ===== 发送 pane：原有全部功能（语音录入 + 上传到电脑）===== -->
    <div class="tabpane" id="paneSend">
      <div class="row">
        <label class="toggle" style="margin-left:0"><input type="checkbox" id="editMode" checked>编辑后发送</label>
        <label class="toggle"><input type="checkbox" id="contMode">连续模式</label>
      </div>

      <div class="live" id="live"><span class="interim">按住下面的按钮开始说话</span></div>

      <!-- 编辑后发送模式下显示：可编辑识别结果再手动发送 -->
      <textarea class="editbox hidden" id="edit" placeholder="识别结果会出现在这里，可修改后点发送"></textarea>
      <div class="btnrow hidden" id="editBtns">
        <button class="secondary" id="clearBtn">清空</button>
        <button id="sendBtn">发送到电脑</button>
      </div>

      <button id="btn" disabled>按住说话</button>

      <!-- 独立回车按钮：点击让电脑在当前焦点窗口按一次 Enter（发消息 / 换行 / 确认） -->
      <button class="secondary" id="enterBtn" disabled>↵ 回车</button>

      <!-- 发送图片/文件到电脑：相册选图 / 拍照，上传后电脑存盘，图片额外进电脑剪贴板 -->
      <div class="btnrow">
        <button class="secondary" id="pickImgBtn">选图片/文件</button>
        <button class="secondary" id="shotBtn">拍照</button>
      </div>
      <!-- 真正的文件输入，隐藏，由上面两个按钮触发 -->
      <input type="file" id="fileInput" class="hidden">
      <input type="file" id="camInput" class="hidden" accept="image/*" capture="environment">
      <div class="upstatus hidden" id="upStatus"></div>

      <!-- 发送历史：本机本次发送过的文本，存 localStorage，点「再发」填回编辑框 -->
      <div class="sec-head">
        <span class="title">发送历史</span>
        <span class="pill tap clear" id="histClear" title="清空历史">清空</span>
      </div>
      <div class="hist" id="hist"></div>

      <div class="log" id="log"></div>
    </div>

    <!-- ===== 接收 pane：电脑推送来的文本 / 文件 ===== -->
    <div class="tabpane hidden" id="paneRecv">
      <div class="sec-head">
        <span class="title">来自电脑</span>
        <span class="pill tap clear" id="recvClear" title="清空接收记录">清空</span>
      </div>
      <div class="recv" id="recv"></div>
    </div>
  </main>

  <footer>
    <span>PhoneMic</span>
    <span id="ver">—</span>
  </footer>

<script>
'use strict';
// ---------- DOM ----------
const $ = id => document.getElementById(id);
const elStatus = $('status'), elLive = $('live'), elBtn = $('btn'),
      elLog = $('log'), elPair = $('pair'), elLang = $('lang'), elVer = $('ver'),
      elEditMode = $('editMode'), elContMode = $('contMode'),
      elEdit = $('edit'), elEditBtns = $('editBtns'),
      elSendBtn = $('sendBtn'), elClearBtn = $('clearBtn'),
      elEnterBtn = $('enterBtn'),
      elHist = $('hist'), elHistClear = $('histClear'),
      elPickImgBtn = $('pickImgBtn'), elShotBtn = $('shotBtn'),
      elFileInput = $('fileInput'), elCamInput = $('camInput'), elUpStatus = $('upStatus'),
      elTabSend = $('tabSend'), elTabRecv = $('tabRecv'),
      elPaneSend = $('paneSend'), elPaneRecv = $('paneRecv'),
      elRecv = $('recv'), elRecvClear = $('recvClear');

// 支持的识别语言，点击 pill 循环切换
const LANGS = ['zh-CN', 'en-US'];

function log(...a){
  const line = a.map(x => typeof x === 'string' ? x : JSON.stringify(x)).join(' ');
  console.log('[pm]', line);
  elLog.textContent = (line + '\n' + elLog.textContent).slice(0, 4000);
}

// ---------- 点击音效 ----------
// 用 Web Audio API 合成短促「嘀」声，不嵌入任何音频文件（契合零资源、单文件的项目精神）。
// 移动端浏览器要求 AudioContext 必须在用户手势中创建/恢复，否则静音；故首个手势时解锁。
let audioCtx = null;
function unlockAudio(){
  if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  try { audioCtx = new AC(); } catch(e){ log('audio init failed', e.message); }
}
// playClick 播放一声短「嘀」。freq 可区分不同动作（默认 880Hz）。
function playClick(freq){
  if (!audioCtx || audioCtx.state !== 'running') return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq || 880;
  // 快速起音 + 指数衰减，约 90ms，干脆不刺耳
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.25, t + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}
// 首次任意指针/键盘交互时解锁音频
['pointerdown','keydown'].forEach(ev =>
  window.addEventListener(ev, unlockAudio, { once: false, passive: true }));

function setStatus(text, kind) {
  elStatus.textContent = text;
  elStatus.className = 'status ' + (kind || '');
}

// ---------- pair code from URL ----------
const url = new URL(location.href);
const pairCode = url.searchParams.get('code') || '';
elPair.textContent = pairCode ? '配对码 ' + pairCode : '⚠ 缺少配对码';

// ---------- WebSocket ----------
let ws = null, wsReady = false, heartbeat = null;
function wsConnect() {
  if (!pairCode) { setStatus('缺少配对码', 'err'); return; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const u = `${proto}//${location.host}/ws?code=${encodeURIComponent(pairCode)}`;
  log('ws connect', u);
  ws = new WebSocket(u);
  ws.onopen    = () => {
    wsReady = true; setStatus('已连接', 'ok'); elBtn.disabled = false; elEnterBtn.disabled = false;
    // 心跳保活：每 15s 发一次 ping，防手机切后台 / 中间设备掐空闲连接
    clearInterval(heartbeat);
    heartbeat = setInterval(() => { if (wsReady) ws.send(JSON.stringify({ type: 'ping' })); }, 15000);
  };
  ws.onclose   = () => {
    wsReady = false; setStatus('断开，重连中', 'err');
    // 断开时若仍在录音，先停掉再禁用按钮，避免识别器在后台空跑
    if (typeof recording !== 'undefined' && recording) endRecording();
    elBtn.disabled = true; elEnterBtn.disabled = true;
    clearInterval(heartbeat);
    setTimeout(wsConnect, 1500);
  };
  ws.onerror   = e => log('ws error', String(e.message || e.type || e));
  ws.onmessage = e => {
    log('ws msg', e.data);
    let msg;
    try { msg = JSON.parse(e.data); } catch(_){ return; }
    // 电脑→手机下行：文本 / 文件下载通知
    if (msg.type === 'push-text') {
      addRecvText(msg.text || '', msg.t);
      flashRecvTab();
    } else if (msg.type === 'push-file') {
      addRecvFile(msg.id, msg.name || '文件', msg.size || 0, msg.t);
      flashRecvTab();
    }
    // pong 等其余类型忽略
  };
}

function send(text){
  if (!wsReady) return;
  ws.send(JSON.stringify({ type: 'text', text }));
  // 记入本机发送历史（所有真正发到电脑的文本都经过这里）
  pushHistory(text);
}

// 通知桌面端：新一段录音开始，清空补空格状态
function sendReset(){
  if (!wsReady) return;
  ws.send(JSON.stringify({ type: 'reset' }));
}

// 通知桌面端：在当前焦点窗口按一次 Enter
function sendEnter(){
  if (!wsReady) return;
  ws.send(JSON.stringify({ type: 'enter' }));
}

// ---------- 发送历史（仅本机本次发送，存 localStorage）----------
// 只记录「真正发到电脑」的文本（在底层 send() 里 hook），刷新/重连不丢。
const HIST_KEY = 'phonemic.history';
const HIST_MAX = 50; // 与桌面窗口一致，最多留 50 条
let sendHistory = loadHistory();

function loadHistory(){
  try {
    const raw = localStorage.getItem(HIST_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch(e){ return []; }
}
function saveHistory(){
  try { localStorage.setItem(HIST_KEY, JSON.stringify(sendHistory)); }
  catch(e){ log('history save failed', e.message); }
}
// 记录一条发送：追加到末尾（最新在后），超出上限丢最旧，然后重渲染。
function pushHistory(text){
  sendHistory.push({ t: Date.now(), text });
  if (sendHistory.length > HIST_MAX) sendHistory = sendHistory.slice(-HIST_MAX);
  saveHistory();
  renderHistory();
}
function fmtTime(ts){
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}
// 渲染历史列表：最新在上。再发按钮用事件委托（见下），这里只画结构。
function renderHistory(){
  if (!sendHistory.length){
    elHist.innerHTML = '<span class="hist-empty">（还没有发送记录）</span>';
    return;
  }
  let html = '';
  for (let i = sendHistory.length - 1; i >= 0; i--){
    const h = sendHistory[i];
    html += '<div class="hist-item">' +
      '<span class="txt">' + escapeHtml(h.text) + '</span>' +
      '<button class="resend" data-idx="' + i + '">再发</button>' +
      '</div>';
  }
  elHist.innerHTML = html;
}
// 再次发送：把该条文本填回编辑框（非编辑模式则自动切到编辑模式，否则编辑框隐藏看不见），
// 由用户改完再手动点「发送到电脑」。
function resendFromHistory(idx){
  const h = sendHistory[idx];
  if (!h) return;
  if (!elEditMode.checked){
    elEditMode.checked = true;
    syncEditUI();
  }
  elEdit.value = h.text;
  finalBuf = h.text;
  elEdit.focus();
  log('resend -> edit', h.text);
}
// 事件委托：历史区内点「再发」
elHist.addEventListener('click', e => {
  const btn = e.target.closest('.resend');
  if (!btn) return;
  resendFromHistory(parseInt(btn.dataset.idx, 10));
});
// 清空历史
elHistClear.addEventListener('click', () => {
  sendHistory = [];
  saveHistory();
  renderHistory();
});

// ---------- bootstrap /info ----------
fetch('/info').then(r=>r.json()).then(j=>{
  elVer.textContent = 'v' + j.version;
  log('info', j);
}).catch(e => log('info error', e));

wsConnect();

// ---------- 安全上下文检查 ----------
// Web Speech API 只在安全上下文（https / localhost）可用。http://IP 必拒麦克风。
// 提前拦截，给出可操作提示，而不是让用户白按一通看 not-allowed。
const httpsURL = 'https://' + location.host + location.pathname + location.search;
if (!window.isSecureContext) {
  setStatus('需用 https:// 打开', 'err');
  elLive.innerHTML = '<span class="err">当前用 http 打开，浏览器禁止麦克风。<br>' +
    '请改用：<br><a style="color:#7dd3fc;word-break:break-all" href="' + httpsURL + '">' + httpsURL + '</a><br>' +
    '（会提示证书不安全，点"高级 → 继续前往"即可）</span>';
}

// ---------- Web Speech API ----------
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  setStatus('当前浏览器不支持语音识别', 'err');
  elLive.innerHTML = '<span class="err">请用 Chrome / Edge / Safari 打开</span>';
}

// 录音状态机：
//   recording  —— 当前是否处于"应该在录音"的逻辑状态（用户意图）
//   manualStop —— 标记本次 onend 是用户主动停止，区别于浏览器静音自动停
//   micDenied  —— 麦克风被拒（not-allowed）的「致命」标志。一旦置位，彻底阻断所有
//                 自动重启，避免 start→error→end→start 死循环刷屏。仅当用户重新
//                 按下按钮（一次新的明确手势）时清除，让其有机会在授权后重试。
//                 单靠 manualStop 不够：onend 与 onerror 存在时序竞争，onend 可能先
//                 触发并安排重启，导致拦截失效（见用户实测日志）。
let rec = null, finalBuf = '', recording = false, manualStop = false, restartTimer = null, micDenied = false;

// 编辑模式：识别结果追加进编辑框，等用户手动发；非编辑模式：实时发。
// 编辑模式下以编辑框为准（finalBuf 跟随其内容）——必须「追加」而非整框赋值，
// 否则每来一段 final 都会用 finalBuf 整体覆盖编辑框，冲掉用户的手动修改与光标。
function emitFinal(text){
  if (elEditMode.checked) {
    elEdit.value += text;     // 追加到末尾，保留用户已有的编辑
    finalBuf = elEdit.value;  // finalBuf 跟随编辑框，供实时显示区与后续累积使用
  } else {
    finalBuf += text;
    send(text);               // 实时发到电脑
  }
}

function startRec(){
  if (!SR) return;
  // 复用一个识别器实例可能残留旧状态，每段新建更干净
  rec = new SR();
  rec.lang = elLang.textContent;
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = ev => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const r = ev.results[i];
      if (r.isFinal) emitFinal(r[0].transcript);
      else           interim += r[0].transcript;
    }
    elLive.innerHTML = '<span>' + escapeHtml(finalBuf) + '</span><span class="interim">' + escapeHtml(interim) + '</span>';
  };
  rec.onerror = e => {
    log('sr error', e.error);
    // 致命错误（权限/非安全上下文）：重启再多次也没用，直接停录音并阻断自动重启
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      recording = false;
      manualStop = true;
      micDenied = true;              // 置致命标志，彻底阻断 onend 的自动重启
      clearTimeout(restartTimer);    // 清掉可能已被 onend 安排的重启，斩断死循环
      if (location.protocol !== 'https:') {
        setStatus('需用 https:// 打开才能用麦克风', 'err');
        elLive.innerHTML = '<span class="err">当前是 http，浏览器禁止麦克风。<br>请在地址栏改成 https:// 重新打开。</span>';
      } else {
        setStatus('麦克风被拒绝，请在浏览器允许', 'err');
      }
      syncBtn();
      return;
    }
    // no-speech / aborted 是良性的（静音或主动停），不提示；其余给用户反馈
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setStatus('识别错误: ' + e.error, 'err');
    }
  };
  rec.onend = () => {
    log('sr end');
    // 仍想录音 + 不是用户主动停，就自动重启——按住模式与连续模式同样适用：
    // Chrome 的 Web Speech 在持续静音几秒后会自行 onend，此时按住模式下用户手指
    // 还按着、recording 仍为 true，若不重启识别器就「假死」，继续说话无反应。
    // recording / manualStop 两个标志已足以表达用户意图，无需再看 contMode。
    // 延迟重启避开 Android Chrome 在 onend 内立即 start 抛 InvalidStateError。
    if (recording && !manualStop && !micDenied) {
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        if (recording && !manualStop && !micDenied) {
          try { startRec(); log('sr auto-restart'); }
          catch(e){ log('sr restart failed', e.message); }
        }
      }, 250);
    }
  };
  try { rec.start(); log('sr start'); }
  catch(e){ log('sr start failed', e.message); recording = false; syncBtn(); }
}

function stopRec(){
  clearTimeout(restartTimer);
  if (rec){
    // 先摘 onend 杜绝自动重启；保留 onresult 让 stop() flush 出来的尾音仍能进缓冲。
    // stop() 偶发抛错（如已停止）不应静默吞掉——记下来便于排障，rec 仍务必清空。
    rec.onend = null;
    try { rec.stop(); } catch(e){ log('sr stop failed', e.message); }
    rec = null;
    log('sr stop');
  }
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// 按钮外观随 recording / 模式同步，避免多处散写文案
function syncBtn(){
  if (recording){
    elBtn.classList.add('recording');
    elBtn.textContent = elContMode.checked ? '停止' : '松开停止';
  } else {
    elBtn.classList.remove('recording');
    elBtn.textContent = elContMode.checked ? '开始说话' : '按住说话';
  }
}

// 开始一段录音
function beginRecording(){
  if (elBtn.disabled || recording) return;
  if (!window.isSecureContext){ // 非 https 直接拦，避免触发 not-allowed 死循环
    setStatus('需用 https:// 打开', 'err');
    return;
  }
  recording = true;
  manualStop = false;
  micDenied = false; // 用户重新按下 = 新的明确手势，清除致命标志，允许重试授权
  // 实时模式才清空 finalBuf；编辑模式保留已有文本，便于多段口述后统一发送
  if (!elEditMode.checked){ finalBuf = ''; sendReset(); }
  syncBtn();
  startRec();
}
function endRecording(){
  if (!recording) return;
  recording = false;
  manualStop = true; // 标记主动停，阻断 onend 自动重启
  syncBtn();
  stopRec();
}

// ---------- 按钮：按住说话 / 连续模式点击切换 ----------
elBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (elContMode.checked) {
    recording ? endRecording() : beginRecording(); // 连续模式：点击切换
  } else {
    beginRecording();                                // 按住模式：按下开始
  }
});
// 按住模式：抬手 / 取消才停。pointerleave 不再停止——按住时手指轻微滑动
// 会触发 leave，会导致频繁误停。pointerup 在按钮外抬手由 pointercancel 兜底。
const releaseStop = () => { if (!elContMode.checked) endRecording(); };
elBtn.addEventListener('pointerup', releaseStop);
elBtn.addEventListener('pointercancel', releaseStop);

// ---------- 语言切换：点 pill 循环 ----------
elLang.addEventListener('click', () => {
  const i = LANGS.indexOf(elLang.textContent);
  elLang.textContent = LANGS[(i + 1) % LANGS.length];
  log('lang ->', elLang.textContent);
});

// ---------- 编辑模式 UI 切换 ----------
function syncEditUI(){
  const on = elEditMode.checked;
  elEdit.classList.toggle('hidden', !on);
  elEditBtns.classList.toggle('hidden', !on);
}
elEditMode.addEventListener('change', syncEditUI);
syncEditUI(); // 默认勾选"编辑后发送",启动时同步一次 UI

// ---------- 连续模式：切换时若在录音先停，再同步按钮文案 ----------
elContMode.addEventListener('change', () => {
  if (recording) endRecording();
  syncBtn();
});

// 用户在编辑框里手动改动时，finalBuf 跟随其内容。否则下一段 final 追加时
// 以及实时显示区都会沿用旧 finalBuf，造成用户编辑被回退。
elEdit.addEventListener('input', () => { finalBuf = elEdit.value; });

// ---------- 编辑模式下：发送 / 清空 ----------
elSendBtn.addEventListener('click', () => {
  const text = elEdit.value.trim();
  if (!text) return;
  sendReset();   // 整段独立发送，前后不与他段补空格
  send(text);
  elEdit.value = '';
  finalBuf = '';
  log('manual send', text);
});
elClearBtn.addEventListener('click', () => { elEdit.value = ''; finalBuf = ''; });

// ---------- 回车按钮：让电脑按一次 Enter ----------
elEnterBtn.addEventListener('click', () => { sendEnter(); log('enter'); });

// ---------- 发送图片/文件到电脑 ----------
// 走独立 HTTP 端点 /upload（multipart），带配对码鉴权。电脑存盘到 file/ 目录，
// 图片类型额外写入电脑剪贴板。两个隐藏 input 分别对应「选文件」与「拍照」。
function setUpStatus(text, kind){
  elUpStatus.textContent = text;
  elUpStatus.className = 'upstatus ' + (kind || '');
  elUpStatus.classList.toggle('hidden', !text);
}

// 上传单个文件到电脑。成功后按返回信息提示是否已进剪贴板。
function uploadFile(file){
  if (!file) return;
  if (!pairCode){ setUpStatus('缺少配对码，无法上传', 'err'); return; }
  // 前端粗略拦超大文件（后端仍有 100MB 硬限），给即时反馈
  const MAX = 100 * 1024 * 1024;
  if (file.size > MAX){
    setUpStatus('文件超过 100MB 上限：' + (file.size/1048576).toFixed(1) + 'MB', 'err');
    return;
  }
  const fd = new FormData();
  fd.append('file', file, file.name || 'upload');
  setUpStatus('上传中…（' + (file.size/1024).toFixed(0) + ' KB）', 'busy');
  elPickImgBtn.disabled = true; elShotBtn.disabled = true;
  fetch('/upload?code=' + encodeURIComponent(pairCode), { method: 'POST', body: fd })
    .then(r => r.json().catch(() => ({ ok: false, error: 'HTTP ' + r.status })))
    .then(j => {
      if (j.ok){
        let msg = '已发送到电脑：' + (j.name || '');
        if (j.isImage) msg += j.clipboard ? '（已进电脑剪贴板，可 Ctrl+V 粘贴）' : '（已存盘，但剪贴板写入失败）';
        setUpStatus(msg, 'ok');
        log('upload ok', j);
      } else {
        setUpStatus('上传失败：' + (j.error || '未知错误'), 'err');
        log('upload fail', j);
      }
    })
    .catch(e => { setUpStatus('上传出错：' + e.message, 'err'); log('upload error', e.message); })
    .finally(() => { elPickImgBtn.disabled = false; elShotBtn.disabled = false; });
}

elPickImgBtn.addEventListener('click', () => elFileInput.click());
elShotBtn.addEventListener('click', () => elCamInput.click());
// change 后取文件上传，并清空 value 以便连续选同一文件也能再次触发
elFileInput.addEventListener('change', () => { uploadFile(elFileInput.files[0]); elFileInput.value = ''; });
elCamInput.addEventListener('change', () => { uploadFile(elCamInput.files[0]); elCamInput.value = ''; });

// ---------- Tab 切换：发送 / 接收 ----------
function switchTab(pane){
  const send = pane === 'send';
  elTabSend.classList.toggle('active', send);
  elTabRecv.classList.toggle('active', !send);
  elPaneSend.classList.toggle('hidden', !send);
  elPaneRecv.classList.toggle('hidden', send);
}
elTabSend.addEventListener('click', () => switchTab('send'));
elTabRecv.addEventListener('click', () => switchTab('recv'));
// 收到新推送时，若用户不在接收 tab，给接收 tab 一个高亮提示（标题加圆点）
function flashRecvTab(){
  if (!elTabRecv.classList.contains('active')) {
    elTabRecv.textContent = '接收 ●';
  }
}
// 切到接收 tab 时清掉提示圆点
elTabRecv.addEventListener('click', () => { elTabRecv.textContent = '接收'; });

// ---------- 接收区（电脑→手机）渲染 ----------
// 收到的内容只存本次会话内存（不落 localStorage——下行多为临时内容，刷新即弃）。
function recvTimeStr(t){
  const d = t ? new Date(t) : new Date();
  const p = n => String(n).padStart(2, '0');
  return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}
function clearRecvEmpty(){
  const e = elRecv.querySelector('.recv-empty');
  if (e) e.remove();
}
// 文本卡：显示文本 + 复制按钮
function addRecvText(text, t){
  clearRecvEmpty();
  const item = document.createElement('div');
  item.className = 'recv-item';
  item.innerHTML =
    '<div class="body"><div class="meta">' + recvTimeStr(t) + ' · 文本</div>' +
    '<div class="txt">' + escapeHtml(text) + '</div></div>' +
    '<button class="act copy">复制</button>';
  item.querySelector('.copy').addEventListener('click', () => copyText(text, item.querySelector('.copy')));
  elRecv.insertBefore(item, elRecv.firstChild); // 最新在上
}
// 文件卡：显示文件名/大小 + 下载链接（指向 /download?id=&code=）
function addRecvFile(id, name, size, t){
  clearRecvEmpty();
  const href = '/download?id=' + encodeURIComponent(id) + '&code=' + encodeURIComponent(pairCode);
  const sizeStr = size > 1048576 ? (size/1048576).toFixed(1)+' MB'
                : size > 1024   ? (size/1024).toFixed(0)+' KB' : size+' B';
  const item = document.createElement('div');
  item.className = 'recv-item';
  item.innerHTML =
    '<div class="body"><div class="meta">' + recvTimeStr(t) + ' · 文件 · ' + sizeStr + '</div>' +
    '<div class="txt">' + escapeHtml(name) + '</div></div>' +
    '<a class="act" href="' + href + '" download="' + escapeHtml(name) + '">下载</a>';
  elRecv.insertBefore(item, elRecv.firstChild);
}
// 复制文本到手机剪贴板：优先 navigator.clipboard，降级 execCommand
function copyText(text, btn){
  const done = () => { if (btn){ const o = btn.textContent; btn.textContent = '已复制'; setTimeout(()=>btn.textContent=o, 1200); } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); done();
  } catch(e){ log('copy failed', e.message); }
}
function renderRecvEmpty(){
  if (!elRecv.children.length) elRecv.innerHTML = '<span class="recv-empty">（电脑发来的文本/文件会出现在这里）</span>';
}
elRecvClear.addEventListener('click', () => { elRecv.innerHTML = ''; renderRecvEmpty(); });

// ---------- 统一点击音效 ----------
// 全局委托：任何 <button>、可点 pill、复选框被点击都播一声「嘀」，给出明确反馈。
// 用捕获阶段，确保即使子元素 handler 调了 stopPropagation 也能先收到。
document.addEventListener('pointerup', e => {
  if (e.target.closest('button, .pill.tap, .toggle, input[type=checkbox], .tab')) {
    playClick();
  }
}, true);

// ---------- 启动时渲染 ----------
renderHistory();
renderRecvEmpty();
</script>
</body>
