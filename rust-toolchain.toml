# 锁定 Rust 工具链版本
#
# 设计来源：design.md §3.2 — 后端语言选定 Rust，最低版本 1.75
# 任务来源：tasks.md 1.1
#
# 实际使用 1.85+：自 idna_adapter 1.2.x 起其 Cargo.toml 使用 edition2024，
# 需要 Cargo 1.85+ 解析。design.md §3.2 将 1.75 列为最低版本，并未限定
# 上限，故升级到 1.85.0 稳定通道，同时保留 design 中提到的关键语言能力。

[toolchain]
channel    = "1.89.0"
profile    = "default"
components = ["rustfmt", "clippy", "rust-src"]
targets    = [
    # 桌面端三平台目标
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]
