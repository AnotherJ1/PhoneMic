name: CI

# PhoneMic 持续集成工作流
#
# 设计来源：
#   - design.md §9.1 测试层级总览（PR 流水线在三平台执行单元 / 属性 / 集成测试）
#   - design.md §9.7 覆盖率与门禁（PR 必须通过 cargo fmt / clippy / test 与前端 lint / test / build）
# 任务来源：tasks.md 1.4
#
# 工作流由两组并行 job 构成：
#   - rust:     cargo fmt --check / clippy -D warnings / cargo test
#   - frontend: pnpm lint / typecheck / test / build
# 两组均覆盖 ubuntu-latest / windows-latest / macos-latest 三平台矩阵。
#
# 注意：
#   - 当前阶段 src-tauri 尚未生成（任务 1.2 未完成），CI 仅运行 workspace 级 cargo 命令，
#     由根 Cargo.toml [workspace] 决定参与构建的 crate 集合，避免对未生成目录的硬依赖。
#   - 移动端 / 桌面壳的 npm 脚本通过 `pnpm -r --if-present` 调用，
#     允许任务 1.2 / 1.3 在尚未注册 lint / test / build 脚本时也保持 CI 绿。

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# 同一引用的并发推送相互取消，节省 CI 资源
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 工具链版本由仓库根 `rust-toolchain.toml` 决定（Rust 1.75）
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      # Tauri 在 Linux 下需要 GTK / WebKit / libsoup 等系统依赖。
      # 当前 workspace 暂未启用 Tauri 路径，但提前安装可避免后续任务 1.2 启用时 CI 红屏。
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libudev-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 任务 1.4 完成时尚未提交 pnpm-lock.yaml；后续任务 1.3 引入移动端依赖后会生成。
      # 因此在脚手架阶段允许在缺失 lockfile 时安装；后续严格化时改为 --frozen-lockfile。
      - name: pnpm install
        run: pnpm install --no-frozen-lockfile

      # 协议漂移守卫（任务 2.5）：拒绝 Rust 与 TS 镜像不一致的 PR。
      # 仅在 Linux 矩阵执行一次，避免三平台重复跑同一份纯字节比对。
      - name: Check Rust ↔ TS protocol stamp
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/gen-ts-types.mjs --check

      - name: pnpm lint
        run: pnpm -r --if-present lint

      - name: pnpm typecheck
        run: pnpm -r --if-present typecheck

      - name: pnpm test
        run: pnpm -r --if-present test

      - name: pnpm build
        run: pnpm -r --if-present build
